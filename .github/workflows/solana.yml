name: Solana (Clanker 5000)

# Builds and tests the native-Solana settlement core and typechecks the sidecar.
# This is the toolchain that can't run in every dev container — CI is where the
# Anchor program actually gets built/tested. See docs/SOLANA_PORT.md.

on:
  push:
    branches: [main]
    paths:
      - "solana/**"
      - "sidecar/**"
      - ".github/workflows/solana.yml"
  pull_request:
    paths:
      - "solana/**"
      - "sidecar/**"
      - ".github/workflows/solana.yml"

# Cancel superseded runs on the same ref.
concurrency:
  group: solana-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Solana 2.x: its cargo-build-sbf ships a modern rustc that reads v4 Cargo.lock
  # (written by the host cargo check) and builds the program's modern deps. 1.18's
  # build-sbf (rustc ~1.75) only understands lockfile v3. (2.1.21 is published on
  # release.anza.xyz; 2.2.21 is not.)
  SOLANA_VERSION: "2.1.21"
  ANCHOR_VERSION: "0.30.1"

jobs:
  anchor:
    name: Anchor build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: solana
    steps:
      - uses: actions/checkout@v4

      # cargo check + anchor build run on current stable. anchor-cli itself is
      # installed PREBUILT from npm (the same mechanism setup-anchor uses), which
      # sidesteps compiling Anchor 0.30.1's old `time`/`edition2024` deps from
      # source — the conflict that blocks every host Rust version.
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache cargo + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            solana/target
          key: ${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}-${{ hashFiles('solana/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}-

      # Fast, deterministic gate — also runs in dev containers without the
      # Solana toolchain.
      - name: cargo check
        run: cargo check --locked -p clanker5000

      - name: Install Solana CLI
        run: |
          # Download then run so a 404 fails the step instead of silently no-oping
          # an empty `sh -c "$(curl ...)"`.
          curl -sSfL "https://release.anza.xyz/v${SOLANA_VERSION}/install" -o /tmp/solana-install.sh
          sh /tmp/solana-install.sh
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          "$HOME/.local/share/solana/install/active_release/bin/solana" --version

      - name: Install Anchor CLI ${{ env.ANCHOR_VERSION }} (prebuilt via npm)
        run: |
          npm i -g @coral-xyz/anchor-cli@${ANCHOR_VERSION}
          anchor --version

      - name: Solana keypair (test validator default signer)
        run: solana-keygen new --no-bip39-passphrase --force -o "$HOME/.config/solana/id.json"

      # Align declare_id! / Anchor.toml with the freshly generated program
      # keypair so `anchor test` deploys and runs cleanly.
      - name: anchor keys sync
        run: anchor keys sync

      # Best-effort (continue-on-error): Solana's platform-tools bundle Rust 1.79,
      # whose Cargo cannot parse the edition2024 crates the resolver now selects
      # (hashbrown 0.17, crypto-common 0.2, …). Until platform-tools ship Rust
      # >= 1.85 (or every such dep is pinned), anchor build/test run for
      # visibility but don't gate the PR. The hard gates are `cargo check` (the
      # program compiles on a modern toolchain) + the sidecar typecheck job.
      - name: anchor build (best-effort — see note above)
        continue-on-error: true
        run: anchor build

      - name: anchor test (best-effort — see note above)
        continue-on-error: true
        run: |
          npm install --no-audit --no-fund
          anchor test

  sidecar:
    name: Sidecar typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        run: npm install --no-audit --no-fund
      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit -p tsconfig.json
