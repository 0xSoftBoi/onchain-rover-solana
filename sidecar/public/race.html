<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Rover GP — Live Drag Race & Betting</title>
<style>
  :root { --bg:#0a0e14; --card:#141a24; --line:#222c3a; --txt:#e6edf3;
          --dim:#7d8aa0; --grn:#3fb950; --red:#f85149; --gold:#d8a657; --blu:#58a6ff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font:14px/1.5 ui-monospace,Menlo,monospace; }
  header { padding:14px 22px; border-bottom:1px solid var(--line); text-align:center; }
  h1 { margin:0; font-size:20px; letter-spacing:1px; }
  .sub { color:var(--dim); font-size:12px; }
  .lanes { display:grid; grid-template-columns:1fr 1fr; gap:14px; padding:18px; max-width:1000px; margin:0 auto; }
  .lane { background:var(--card); border:2px solid var(--line); border-radius:12px; padding:12px; transition:.2s; }
  .lane.win { border-color:var(--grn); box-shadow:0 0 24px rgba(63,185,80,.4); }
  .lane h2 { margin:0 0 8px; font-size:15px; display:flex; justify-content:space-between; align-items:center; }
  .lane img { width:100%; border-radius:8px; background:#000; aspect-ratio:4/3; object-fit:cover; }
  .odds { font-size:26px; font-weight:700; color:var(--gold); }
  .pool { color:var(--dim); font-size:12px; }
  .bet-row { display:flex; gap:6px; margin-top:10px; }
  .bet-row button { flex:1; background:#1f6feb; color:#fff; border:0; padding:10px; border-radius:7px; font:inherit; cursor:pointer; }
  .bet-row button:hover { background:#388bfd; }
  .banner { text-align:center; font-size:40px; font-weight:800; padding:14px;
            letter-spacing:2px; min-height:30px; }
  .banner.go { color:var(--grn); } .banner.count { color:var(--gold); }
  .ctrl { text-align:center; padding:10px; }
  .ctrl button { background:#238636; color:#fff; border:0; padding:9px 18px; border-radius:7px; font:inherit; cursor:pointer; margin:0 5px; }
  .ctrl button.sec { background:#30363d; }
  .status { text-align:center; color:var(--dim); padding-bottom:10px; }
  #toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%);
           background:var(--card); border:1px solid var(--line); padding:10px 18px;
           border-radius:8px; opacity:0; transition:.3s; }
</style>
</head>
<body>
<header>
  <h1>🏁 ROVER GP — LIVE DRAG RACE</h1>
  <div class="sub">pay to pilot · bet on the winner · settled on-chain by the guard robot · one bet per human (World ID)</div>
</header>
<div class="banner" id="banner">—</div>
<div class="lanes" id="lanes"></div>
<div class="status" id="status">connecting…</div>
<div class="ctrl">
  <button onclick="api('/race/open','open race + betting')">① Open betting</button>
  <button onclick="api('/race/arm','lock bets')">② Lock bets</button>
  <button onclick="countdown()">③ 3·2·1·GO</button>
  <button class="sec" onclick="finish('guard')">guard wins</button>
  <button class="sec" onclick="finish('courier')">courier wins</button>
</div>
<div id="toast"></div>

<script>
const $ = (id)=>document.getElementById(id);
const usd = (n)=>"$"+Number(n||0).toFixed(2);
let feeds = {}, racers = ["guard","courier"];
function toast(m){ const t=$("toast"); t.textContent=m; t.style.opacity=1; setTimeout(()=>t.style.opacity=0,2200); }

async function api(path,label){ try{ await fetch(path,{method:"POST"}); toast(label); }catch(e){ toast("err: "+e.message);} }

async function poll(){
  try {
    const [st, od] = await Promise.all([
      (await fetch("/status")).json(),
      (await fetch("/race/odds")).json(),
    ]);
    racers = Object.keys(st.robots);
    const race = st.race || {};
    renderLanes(st.robots, od, race);
    let banner = "PADDOCK", cls="";
    if (race.status==="betting"){ banner="🎲 BETTING OPEN"; }
    else if (race.status==="armed"){ banner="BETS LOCKED"; }
    else if (race.status==="racing"){ banner="🏁 RACING"; cls="go"; }
    else if (race.status==="finished"){ banner="🏆 "+(race.winner||"?").toUpperCase()+" WINS"; cls="go"; }
    if (!window._counting){ $("banner").textContent=banner; $("banner").className="banner "+cls; }
    $("status").textContent = `pool ${usd((od.total||0))} · ${od.count||0} bets · race ${race.status||"idle"}`+(race.finishMs?` · ${(race.finishMs/1000).toFixed(2)}s`:"");
  } catch(e){ $("status").textContent="poll err: "+e.message; }
}
function renderLanes(robots, od, race){
  let h="";
  for (const name of Object.keys(robots)){
    const r=robots[name], o=(od.odds&&od.odds[name])||1, pool=(od.pool&&od.pool[name])||0;
    const win = race.status==="finished" && race.winner===name;
    h+=`<div class="lane ${win?'win':''}">
      <h2><span>${r.ens||name}</span><span class="odds">${o.toFixed(2)}×</span></h2>
      <img id="feed-${name}" />
      <div class="pool">pool ${usd(pool)} on this rover</div>
      <div class="bet-row">
        <button onclick="bet('${name}',1)">Bet $1</button>
        <button onclick="bet('${name}',2)">$2</button>
        <button onclick="bet('${name}',5)">$5</button>
      </div></div>`;
  }
  $("lanes").innerHTML=h;
  for (const name of Object.keys(robots)){
    const img=$("feed-"+name); if(img && robots[name].url && !img.src.includes("/stream")) img.src=robots[name].url+"/stream";
  }
}
async function bet(racer,amount){
  // one-bet-per-human: in production the nullifier comes from World ID verify
  const nullifier = localStorage.getItem("nullifier") || ("dev-"+Math.random().toString(36).slice(2));
  localStorage.setItem("nullifier", nullifier);
  const r = await (await fetch("/race/bet",{method:"POST",headers:{'Content-Type':'application/json'},
    body:JSON.stringify({racer,amount,nullifier})})).json();
  toast(r.error ? ("✋ "+r.error) : `bet ${usd(amount)} on ${racer} — odds now ${r.odds[racer]}×`);
}
async function countdown(){
  await api("/race/arm","");
  window._counting=true;
  for (const n of ["3","2","1","GO!"]){ $("banner").textContent=n; $("banner").className="banner count"; await new Promise(r=>setTimeout(r,700)); }
  $("banner").className="banner go";
  window._counting=false;
  await fetch("/race/start",{method:"POST"});
  toast("GO! pilots drive now");
}
async function finish(winner){
  await fetch("/race/finish",{method:"POST",headers:{'Content-Type':'application/json'},body:JSON.stringify({winner})});
  toast("🏁 "+winner+" wins — settle on-chain when funded");
}
poll(); setInterval(poll, 1500);
</script>
</body>
</html>
