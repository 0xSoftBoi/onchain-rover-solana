<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>The Onchain Rover — Mission Control</title>
<style>
  :root { --bg:#0a0e14; --card:#141a24; --line:#222c3a; --txt:#e6edf3;
          --dim:#7d8aa0; --grn:#3fb950; --red:#f85149; --gold:#d8a657; --blu:#58a6ff; }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt);
         font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,monospace; }
  header { padding:18px 24px; border-bottom:1px solid var(--line);
           display:flex; align-items:baseline; gap:14px; }
  h1 { font-size:18px; margin:0; letter-spacing:.5px; }
  .sub { color:var(--dim); font-size:12px; }
  .wrap { display:grid; grid-template-columns:1fr 1fr; gap:16px; padding:20px; max-width:1100px; }
  .card { background:var(--card); border:1px solid var(--line); border-radius:10px; padding:16px; }
  .card h2 { font-size:12px; text-transform:uppercase; letter-spacing:1px;
             color:var(--dim); margin:0 0 12px; }
  .robot { display:flex; align-items:center; gap:12px; margin-bottom:14px; }
  .dot { width:10px; height:10px; border-radius:50%; background:var(--red); flex:none; }
  .dot.up { background:var(--grn); box-shadow:0 0 8px var(--grn); }
  .robot .meta { flex:1; }
  .robot .ens { font-weight:600; }
  .robot .addr { color:var(--dim); font-size:11px; }
  .pill { font-size:11px; padding:2px 8px; border-radius:20px; border:1px solid var(--line); }
  .batt { color:var(--grn); } .batt.low { color:var(--gold); }
  .auction { text-align:center; padding:8px 0; }
  .price { font-size:48px; font-weight:700; color:var(--gold); transition:.2s; }
  .price.sold { color:var(--grn); }
  .status-line { color:var(--dim); min-height:20px; }
  .full { grid-column:1 / -1; }
  button { background:#1f6feb; color:#fff; border:0; padding:9px 16px; border-radius:7px;
           font:inherit; cursor:pointer; margin:4px 6px 4px 0; }
  button:hover { background:#388bfd; } button:disabled { opacity:.4; cursor:default; }
  .btn-tx { background:#238636; } .btn-tx:hover { background:#2ea043; }
  a { color:var(--blu); } code { color:var(--gold); }
  .kv { display:flex; justify-content:space-between; padding:3px 0; border-bottom:1px solid var(--line); }
  .kv:last-child { border:0; } .kv .v { color:var(--dim); }
  #log { font-size:12px; color:var(--dim); max-height:140px; overflow:auto; white-space:pre-wrap; }
</style>
</head>
<body>
<header>
  <h1>🤖 THE ONCHAIN ROVER</h1>
  <span class="sub">Mission Control · hire a robot over HTTP · ETHGlobal NYC 2026</span>
</header>
<div class="wrap">
  <div class="card">
    <h2>Fleet</h2>
    <div id="fleet">loading…</div>
  </div>

  <div class="card">
    <h2>On-Chain (Arc testnet)</h2>
    <div class="kv"><span>EventPass NFT</span><span class="v" id="eventpass">—</span></div>
    <div class="kv"><span>Chain</span><span class="v" id="chain">—</span></div>
    <div class="kv"><span>Explorer</span><span class="v"><a id="explorer" target="_blank">arcscan</a></span></div>
    <div id="txs" style="margin-top:10px"></div>
  </div>

  <div class="card full">
    <h2>🤠 Dutch Auction — EventPass</h2>
    <div class="auction">
      <div class="price" id="price">$—</div>
      <div class="status-line" id="auction-status">idle</div>
    </div>
    <div style="text-align:center; margin-top:8px">
      <button id="run">▶ Run live auction + settle on-chain</button>
      <button id="run-voice" class="btn-tx">🔊 Auction (speakers only)</button>
    </div>
  </div>

  <div class="card full">
    <h2>Activity</h2>
    <div id="log"></div>
  </div>
</div>

<script>
const $ = (id) => document.getElementById(id);
const log = (m) => { $("log").textContent = `[${new Date().toLocaleTimeString()}] ${m}\n` + $("log").textContent; };
const usdc = (s) => "$" + (Number(s||0)/1e6).toFixed(2);

async function poll() {
  try {
    const s = await (await fetch("/status")).json();
    $("chain").textContent = s.arc.chainId;
    $("explorer").href = s.arc.explorer;
    $("eventpass").textContent = s.eventPass || "not deployed yet";
    let html = "";
    for (const [name, r] of Object.entries(s.robots)) {
      const up = r.ok;
      const batt = (r.battery_v ?? 0).toFixed ? r.battery_v.toFixed(2) : r.battery_v;
      html += `<div class="robot">
        <div class="dot ${up?'up':''}"></div>
        <div class="meta">
          <div class="ens">${r.ens||name} <span class="pill">${r.role||name}</span></div>
          <div class="addr">${r.wallet||''} · ${usdc(r.usdc6)} USDC</div>
        </div>
        <div class="pill batt ${(r.battery_v||13)<11.5?'low':''}">${up?(batt+'V'):'offline'}</div>
      </div>`;
    }
    $("fleet").innerHTML = html;
    if (s.race && s.race.status) {
      $("auction-status").textContent = "race: " + s.race.status +
        (s.race.winner ? ` · winner ${s.race.winner}` : "");
    }
  } catch (e) { log("poll error: " + e.message); }
}

async function runAuction(withSettle) {
  const aid = "dash-" + Date.now();
  $("run").disabled = $("run-voice").disabled = true;
  $("price").classList.remove("sold");
  log(withSettle ? "starting auction + on-chain settlement…" : "starting speaker auction…");
  try {
    await fetch("/race/auction/start", { method:"POST", headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ auctionId: aid, settle: withSettle }) });
    // poll the guard result + animate price
    const guard = "GUARD"; let done = false;
    for (let i=0; i<40 && !done; i++) {
      await new Promise(r=>setTimeout(r,1500));
      const st = await (await fetch("/race/auction/state?auctionId="+aid)).json();
      if (st.price) { $("price").textContent = "$"+Number(st.price).toFixed(2);
        $("auction-status").textContent = st.note||""; }
      if (st.agreed) { done = true;
        $("price").textContent = "$"+Number(st.price).toFixed(2);
        $("price").classList.add("sold");
        $("auction-status").textContent = "SOLD to "+(st.buyer||"courier")+"!";
        log("deal: $"+st.price);
        if (st.pay) { addTx("payment", st.pay); log("paid on Arc: "+st.pay); }
        if (st.mint) { addTx("EventPass mint", st.mint); log("minted: "+st.mint); }
      }
    }
  } catch (e) { log("auction error: " + e.message); }
  $("run").disabled = $("run-voice").disabled = false;
}
function addTx(label, tx) {
  const ex = $("explorer").href.replace(/\/$/,'');
  $("txs").innerHTML += `<div class="kv"><span>${label}</span>
    <span class="v"><a target="_blank" href="${ex}/tx/${tx}">${tx.slice(0,10)}…</a></span></div>`;
}
$("run").onclick = () => runAuction(true);
$("run-voice").onclick = () => runAuction(false);
poll(); setInterval(poll, 4000);
</script>
</body>
</html>
