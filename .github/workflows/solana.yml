name: Solana (Clanker 5000)

# Builds and tests the native-Solana settlement core and typechecks the sidecar.
# This is the toolchain that can't run in every dev container — CI is where the
# Anchor program actually gets built/tested. See docs/SOLANA_PORT.md.

on:
  push:
    branches: [main]
    paths:
      - "solana/**"
      - "sidecar/**"
      - ".github/workflows/solana.yml"
  pull_request:
    paths:
      - "solana/**"
      - "sidecar/**"
      - ".github/workflows/solana.yml"

# Cancel superseded runs on the same ref.
concurrency:
  group: solana-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Anchor 0.31's dep tree pulls edition-2024 crates (zeroize_derive 1.5, …) that
  # only a build-sbf rustc >= 1.85 can parse. Agave 4.0.3 ships platform-tools
  # v1.53 (rustc >= 1.85); 3.0.10 (v1.51 = rustc 1.84) and 2.1.x (v1.43 = 1.79)
  # are too old and fail the lockfile parse. Use 0.31.0 for anchor-cli: the npm
  # 0.31.1 package ships a 0.31.0 binary and its launcher self-rejects on the
  # version mismatch.
  SOLANA_VERSION: "4.0.3"
  ANCHOR_VERSION: "0.31.0"

jobs:
  anchor:
    name: Anchor build + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: solana
    steps:
      - uses: actions/checkout@v4

      # cargo check + anchor build run on current stable. anchor-cli itself is
      # installed PREBUILT from npm (the same mechanism setup-anchor uses), which
      # sidesteps compiling Anchor 0.30.1's old `time`/`edition2024` deps from
      # source — the conflict that blocks every host Rust version.
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Cache cargo + build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            solana/target
          key: ${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}-${{ hashFiles('solana/**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-anchor-${{ env.ANCHOR_VERSION }}-

      # Fast, deterministic gate — also runs in dev containers without the
      # Solana toolchain.
      - name: cargo check
        run: cargo check --locked -p clanker5000

      - name: Install Solana CLI
        run: |
          # Download then run so a 404 fails the step instead of silently no-oping
          # an empty `sh -c "$(curl ...)"`.
          curl -sSfL "https://release.anza.xyz/v${SOLANA_VERSION}/install" -o /tmp/solana-install.sh
          sh /tmp/solana-install.sh
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
          "$HOME/.local/share/solana/install/active_release/bin/solana" --version

      - name: Install Anchor CLI ${{ env.ANCHOR_VERSION }} (prebuilt via npm)
        run: |
          npm i -g @coral-xyz/anchor-cli@${ANCHOR_VERSION}
          anchor --version

      - name: Solana keypair (test validator default signer)
        run: solana-keygen new --no-bip39-passphrase --force -o "$HOME/.config/solana/id.json"

      # Align declare_id! / Anchor.toml with the freshly generated program
      # keypair so `anchor test` deploys and runs cleanly.
      - name: anchor keys sync
        run: anchor keys sync

      # Hard gates now: with Anchor 0.31 + Agave 4.0.3 (platform-tools v1.53,
      # rustc >= 1.85) the BPF build, IDL generation, and the integration tests
      # all pass (verified locally: 3/3 in tests/clanker5000.ts). Copy the
      # generated IDL into the sidecar so its runtime loader has it.
      - name: anchor build (BPF + IDL)
        run: anchor build

      - name: Sync generated IDL into the sidecar
        run: cp target/idl/clanker5000.json ../sidecar/src/generated/clanker5000.json

      - name: anchor test (local validator integration suite)
        run: |
          npm install --no-audit --no-fund
          anchor test

  sidecar:
    name: Sidecar typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sidecar
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install deps
        run: npm install --no-audit --no-fund
      - name: Typecheck (tsc --noEmit)
        run: npx tsc --noEmit -p tsconfig.json

  # Deterministic, reproducible build for on-chain verification (mainnet
  # requirement). solana-verify builds in a pinned Docker image; the resulting
  # hash is what you publish + match against the deployed program with
  # `solana-verify verify-from-repo`. See docs/MAINNET_READINESS.md §1.
  verified-build:
    name: Verifiable build (solana-verify)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
      - name: Install solana-verify
        run: cargo install solana-verify --locked
      - name: Deterministic build (Docker)
        working-directory: solana
        run: solana-verify build --library-name clanker5000
      - name: Executable hash (publish + match on-chain)
        working-directory: solana
        run: solana-verify get-executable-hash target/deploy/clanker5000.so
