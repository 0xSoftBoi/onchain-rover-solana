<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Clanker500 GP Field Check</title>
<style>
  :root {
    --bg:#090c10; --panel:#111822; --panel2:#151f2b; --line:#273342;
    --txt:#eef5fb; --dim:#8fa0b2; --ok:#42d17d; --warn:#f0bf4f; --bad:#ff6262;
  }
  * { box-sizing:border-box; }
  body {
    margin:0; background:var(--bg); color:var(--txt);
    font:14px/1.45 ui-monospace, Menlo, Consolas, monospace;
  }
  header {
    display:flex; justify-content:space-between; align-items:flex-end; gap:16px;
    padding:18px 22px; border-bottom:1px solid var(--line);
  }
  h1 { margin:0; font-size:19px; letter-spacing:0; }
  main { max-width:1160px; margin:0 auto; padding:18px; display:grid; gap:14px; }
  section { border:1px solid var(--line); background:var(--panel); border-radius:8px; padding:14px; }
  h2 { margin:0 0 10px; color:var(--dim); font-size:12px; text-transform:uppercase; }
  a, button {
    display:inline-flex; align-items:center; justify-content:center; min-height:34px;
    padding:7px 10px; border-radius:7px; border:1px solid rgba(255,255,255,.08);
    background:#1f6feb; color:#fff; text-decoration:none; font:inherit;
  }
  button.secondary, a.secondary { background:#273342; color:var(--txt); }
  .grid { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:12px; }
  .checks, .rounds, .links { display:grid; gap:8px; }
  .row {
    display:grid; grid-template-columns:150px minmax(0,1fr); gap:10px;
    align-items:center; min-height:42px; padding:8px; border:1px solid var(--line);
    border-radius:8px; background:var(--panel2);
  }
  .pill {
    display:inline-flex; align-items:center; justify-content:center; min-height:25px;
    padding:3px 8px; border-radius:999px; border:1px solid var(--line);
    background:#0b1118; color:var(--dim);
  }
  .pill.ok { color:var(--ok); }
  .pill.warn { color:var(--warn); }
  .pill.bad { color:var(--bad); }
  .detail { min-width:0; overflow-wrap:anywhere; }
  .detail b { display:block; font-weight:600; }
  .detail span { display:block; color:var(--dim); font-size:12px; margin-top:2px; }
  .dim { color:var(--dim); }
  .actions { display:flex; flex-wrap:wrap; gap:8px; }
  code { color:var(--warn); }
  @media (max-width:760px) {
    header { display:block; }
    .grid, .row { grid-template-columns:1fr; }
  }
</style>
</head>
<body>
<header>
  <div>
    <h1>Clanker500 GP Field Check</h1>
    <div class="dim" id="stamp">loading</div>
  </div>
  <div class="actions">
    <a class="secondary" href="/lobby.html">Lobby</a>
    <button class="secondary" id="refresh">Refresh</button>
  </div>
</header>
<main>
  <section>
    <h2>Readiness</h2>
    <div class="checks" id="checks"></div>
  </section>

  <section>
    <h2>Operator Links</h2>
    <div class="links" id="links"></div>
  </section>

  <section>
    <h2>Robot Bridge</h2>
    <div class="grid" id="robots"></div>
  </section>

  <section>
    <h2>Recent Rounds</h2>
    <div class="rounds" id="rounds"></div>
  </section>

  <section>
    <h2>Run Locally Before Devices</h2>
    <div class="row">
      <span class="pill warn">sim</span>
      <div class="detail"><code>SIDECAR_URL=http://127.0.0.1:4021 npm run e2e:field-sim</code></div>
    </div>
  </section>
</main>
<script>
const checks = document.getElementById("checks");
const links = document.getElementById("links");
const robots = document.getElementById("robots");
const rounds = document.getElementById("rounds");
const stamp = document.getElementById("stamp");

async function refresh() {
  const res = await fetch("/field/preflight");
  const body = await res.json();
  const summary = body.summary || { pass: 0, warn: 0, fail: 0 };
  stamp.textContent = `${body.ok ? "ready enough" : "needs attention"} · ${summary.pass} pass / ${summary.warn} warn / ${summary.fail} fail · ${new Date(body.generatedAt).toLocaleTimeString()} · ${body.publicBaseUrl}`;
  renderChecks(body.checks || []);
  renderLinks(body.urls || {});
  renderRobots(body.robots || {});
  renderRounds(body.rounds || []);
}

function renderChecks(items) {
  checks.textContent = "";
  for (const item of items) {
    const row = document.createElement("div");
    row.className = "row";
    row.append(pill(toneFor(item), item.name), detail(item.detail, item.remediation, item.category));
    checks.append(row);
  }
}

function renderLinks(urls) {
  links.textContent = "";
  for (const [label, url] of Object.entries(urls)) {
    const row = document.createElement("div");
    row.className = "row";
    const open = document.createElement("a");
    open.href = String(url).replace("<roundId>", "");
    open.target = "_blank";
    open.rel = "noreferrer";
    open.textContent = label;
    row.append(open, detail(String(url)));
    links.append(row);
  }
}

function renderRobots(value) {
  robots.textContent = "";
  for (const name of ["guard", "courier"]) {
    const robot = value[name] || {};
    const row = document.createElement("div");
    row.className = "row";
    row.append(
      pill(robot.robotConnected ? "ok" : "warn", name),
      detail(`${robot.robotConnected ? "attached" : "waiting"} · ${robot.telemetry?.source || "no telemetry"} · pilots ${robot.pilotClients || 0}`),
    );
    robots.append(row);
  }
}

function renderRounds(items) {
  rounds.textContent = "";
  if (!items.length) {
    rounds.append(detail("No persisted rounds yet."));
    return;
  }
  for (const round of items) {
    const row = document.createElement("div");
    row.className = "row";
    const open = document.createElement("a");
    open.href = `/round.html?round=${encodeURIComponent(round.id)}`;
    open.textContent = round.id;
    row.append(open, detail(`${round.status}/${round.chainStatus || "not-opened"} · ${round.winner || "no winner"} · ${round.proofHash || "no proof"}`));
    rounds.append(row);
  }
}

function pill(tone, text) {
  const el = document.createElement("span");
  el.className = `pill ${tone}`;
  el.textContent = text;
  return el;
}

function detail(text, remediation = "", category = "") {
  const el = document.createElement("div");
  el.className = "detail";
  const main = document.createElement("b");
  main.textContent = text;
  el.append(main);
  if (remediation || category) {
    const hint = document.createElement("span");
    hint.textContent = [category, remediation].filter(Boolean).join(" · ");
    el.append(hint);
  }
  return el;
}

function toneFor(item) {
  if (item.status === "pass") return "ok";
  if (item.status === "warn") return "warn";
  return item.ok ? "ok" : "bad";
}

document.getElementById("refresh").onclick = refresh;
refresh();
setInterval(refresh, 3000);
</script>
</body>
</html>
