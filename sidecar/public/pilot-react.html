<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Clanker500 Manual Pilot</title>
<style>
  :root {
    color-scheme: dark;
    --bg:#05070a;
    --panel:rgba(8,12,18,.72);
    --panel-strong:rgba(8,12,18,.9);
    --line:rgba(223,235,255,.18);
    --text:#f2f7fb;
    --muted:#9baec2;
    --ok:#49d17d;
    --warn:#f2c14e;
    --bad:#ff5d5d;
    --blue:#59a6ff;
  }
  * { box-sizing:border-box; }
  html, body, #root {
    margin:0;
    width:100%;
    height:100%;
    min-height:100dvh;
    background:var(--bg);
    color:var(--text);
    font:14px/1.35 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    overflow:hidden;
    touch-action:none;
  }
  button { font:inherit; color:inherit; }
  .app {
    position:relative;
    overflow:hidden;
    width:100vw;
    height:100dvh;
    background:#020305;
  }
  .video {
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    background:#020305;
    opacity:.96;
  }
  .video.off { opacity:.22; }
  .video-fallback {
    position:absolute;
    inset:0;
    display:grid;
    place-items:center;
    color:var(--muted);
    background:
      linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px),
      linear-gradient(0deg, rgba(255,255,255,.035) 1px, transparent 1px), #070a0f;
    background-size:44px 44px;
  }
  .hud {
    position:absolute;
    inset:0;
    pointer-events:none;
  }
  .topbar {
    position:absolute;
    left:10px;
    right:10px;
    top:10px;
    display:flex;
    gap:8px;
    align-items:flex-start;
    flex-wrap:wrap;
  }
  .chip {
    display:inline-flex;
    align-items:center;
    gap:6px;
    min-height:28px;
    max-width:calc(100vw - 20px);
    padding:5px 8px;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--panel);
    backdrop-filter:blur(10px);
    text-shadow:0 1px 2px #000;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .dot {
    flex:0 0 auto;
    width:8px;
    height:8px;
    border-radius:50%;
    background:var(--warn);
    box-shadow:0 0 10px currentColor;
  }
  .chip.up .dot { background:var(--ok); }
  .chip.down .dot { background:var(--bad); }
  .readout {
    position:absolute;
    left:16px;
    bottom:304px;
    padding:7px 9px;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--panel);
    backdrop-filter:blur(10px);
    text-shadow:0 1px 2px #000;
  }
  .prompt {
    position:absolute;
    left:10px;
    top:48px;
    max-width:calc(100% - 112px);
    padding:6px 8px;
    border:1px solid var(--line);
    border-radius:8px;
    background:var(--panel);
    color:var(--muted);
    text-shadow:0 1px 2px #000;
    overflow:hidden;
    text-overflow:ellipsis;
    white-space:nowrap;
  }
  .stick {
    pointer-events:auto;
    position:absolute;
    left:16px;
    bottom:96px;
    width:184px;
    height:184px;
    border:1px solid rgba(89,166,255,.5);
    border-radius:50%;
    background:rgba(5,8,12,.28);
    backdrop-filter:blur(4px);
    touch-action:none;
  }
  .stick::before {
    content:"";
    position:absolute;
    inset:25px;
    border:1px solid rgba(223,235,255,.16);
    border-radius:50%;
  }
  .stick::after {
    content:"drive";
    position:absolute;
    left:50%;
    bottom:-28px;
    transform:translateX(-50%);
    color:var(--text);
    font-size:12px;
    text-shadow:0 1px 2px #000;
  }
  .knob {
    position:absolute;
    left:50%;
    top:50%;
    width:74px;
    height:74px;
    border-radius:50%;
    transform:translate(calc(-50% + var(--x, 0px)), calc(-50% + var(--y, 0px)));
    background:rgba(89,166,255,.78);
    box-shadow:0 0 18px rgba(89,166,255,.45);
    border:1px solid rgba(255,255,255,.42);
    pointer-events:none;
  }
  .stop {
    pointer-events:auto;
    position:absolute;
    right:16px;
    bottom:20px;
    width:86px;
    height:86px;
    border:0;
    border-radius:50%;
    background:var(--bad);
    color:#fff;
    font-weight:800;
    font-size:16px;
    box-shadow:0 7px 28px rgba(255,93,93,.5);
  }
  .modal {
    position:absolute;
    inset:0;
    z-index:20;
    display:grid;
    place-items:center;
    padding:22px;
    background:rgba(0,0,0,.25);
    backdrop-filter:blur(2px);
  }
  .modal.hidden { display:none; }
  .modal-panel {
    width:min(360px, 90vw);
    border:1px solid var(--line);
    border-radius:10px;
    background:var(--panel-strong);
    backdrop-filter:blur(14px);
    padding:18px;
    text-align:center;
    box-shadow:0 18px 60px rgba(0,0,0,.45);
  }
  .modal-panel h1 {
    margin:0 0 7px;
    font-size:20px;
    letter-spacing:0;
  }
  .modal-status {
    min-height:18px;
    margin:0 0 12px;
    color:var(--muted);
    font-size:12px;
    overflow-wrap:anywhere;
  }
  .modal-status.bad { color:var(--bad); }
  .modal-status.ok { color:var(--ok); }
  .start {
    width:100%;
    height:62px;
    border:0;
    border-radius:8px;
    background:var(--ok);
    color:#041008;
    font-weight:800;
    font-size:20px;
  }
  .start:disabled { opacity:.55; }
  @media (max-width:420px) {
    .chip { font-size:12px; }
    .stick { width:174px; height:174px; }
    .knob { width:70px; height:70px; }
    .readout { bottom:292px; }
    .stop { width:82px; height:82px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/pilot-react.bundle.js?v=camera-reconnect"></script>
</body>
</html>
