<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Clanker500 GP Pilot</title>
<script>
  document.documentElement.dataset.mode = new URLSearchParams(location.search).get("mode") === "manual"
    ? "manual"
    : "race";
</script>
<style>
  :root {
    --bg:#05070a; --glass:rgba(5,8,12,.62); --line:rgba(223,235,255,.18);
    --txt:#f2f7fb; --muted:#9baec2; --ok:#49d17d; --warn:#f2c14e;
    --bad:#ff5d5d; --blue:#59a6ff;
  }
  * { box-sizing:border-box; }
  html, body {
    margin:0; width:100%; height:100%; background:var(--bg); color:var(--txt);
    font:14px/1.35 ui-monospace, Menlo, Consolas, monospace;
    overflow:hidden; touch-action:none;
  }
  body { display:grid; place-items:center; }
  button { font:inherit; color:inherit; }
  #app {
    position:relative; overflow:hidden; background:#020305; aspect-ratio:9 / 16;
    width:min(100vw, calc(100dvh * 9 / 16));
    height:min(100dvh, calc(100vw * 16 / 9));
    max-width:100vw; max-height:100dvh;
    box-shadow:0 0 0 1px rgba(255,255,255,.08), 0 24px 80px rgba(0,0,0,.45);
  }
  .video {
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
    background:#020305; z-index:1;
  }
  .local-video { z-index:2; }
  .video.off { opacity:.28; }
  .video-fallback {
    position:absolute; inset:0; z-index:0; display:grid; place-items:center;
    color:var(--muted); background:
      linear-gradient(90deg, rgba(255,255,255,.035) 1px, transparent 1px),
      linear-gradient(0deg, rgba(255,255,255,.035) 1px, transparent 1px), #070a0f;
    background-size:44px 44px;
  }
  #zone { position:absolute; inset:0; z-index:22; pointer-events:none; touch-action:none; }
  .stick-zone {
    position:absolute; bottom:112px; width:142px; height:142px; pointer-events:auto;
    touch-action:none; border:1px solid rgba(223,235,255,.22); border-radius:50%;
    background:rgba(5,8,12,.34); backdrop-filter:blur(4px);
  }
  #driveZone { left:22px; }
  #cameraZone { right:22px; }
  .stick-zone::before {
    content:""; position:absolute; inset:18px; border:1px solid rgba(223,235,255,.16);
    border-radius:50%;
  }
  .stick-zone::after {
    content:attr(data-label); position:absolute; left:50%; bottom:-24px; transform:translateX(-50%);
    color:var(--muted); font-size:11px; text-shadow:0 1px 2px #000;
  }
  .stick-knob {
    position:absolute; left:50%; top:50%; width:58px; height:58px; border-radius:50%;
    transform:translate(calc(-50% + var(--x, 0px)), calc(-50% + var(--y, 0px)));
    background:rgba(89,166,255,.78); box-shadow:0 0 18px rgba(89,166,255,.45);
    border:1px solid rgba(255,255,255,.42); pointer-events:none;
  }
  #cameraZone .stick-knob {
    width:52px; height:52px; background:rgba(73,209,125,.78);
    box-shadow:0 0 18px rgba(73,209,125,.45);
  }
  .hud { pointer-events:none; position:absolute; inset:0; z-index:12; }
  .chip-row {
    position:absolute; left:12px; right:12px; top:10px; display:flex;
    align-items:flex-start; justify-content:space-between; gap:10px;
  }
  .chip {
    display:inline-flex; align-items:center; gap:6px; min-height:28px; padding:5px 8px;
    border:1px solid var(--line); border-radius:8px; background:var(--glass);
    backdrop-filter:blur(10px); color:var(--txt); text-shadow:0 1px 2px #000;
    font-size:12px; white-space:nowrap;
  }
  .data-panel {
    width:min(222px, 58vw); border:1px solid var(--line); border-radius:8px;
    background:var(--glass); backdrop-filter:blur(10px); padding:8px 9px;
    text-shadow:0 1px 2px #000;
  }
  .data-head {
    display:flex; justify-content:space-between; gap:8px; margin-bottom:6px;
    color:var(--txt); font-size:12px;
  }
  .data-head span, .data-grid b { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .data-head span:last-child { color:var(--muted); text-align:right; }
  .data-grid {
    display:grid; grid-template-columns:34px minmax(0,1fr) 36px minmax(0,1fr);
    column-gap:6px; row-gap:4px; align-items:center; font-size:11px;
  }
  .data-grid span { color:var(--muted); }
  .data-grid b { color:var(--txt); font-weight:600; text-align:right; }
  .chip.dim { color:var(--muted); }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--warn); box-shadow:0 0 10px currentColor; }
  .conn.up .dot { background:var(--ok); }
  .conn.down .dot { background:var(--bad); }
  .ok { color:var(--ok); } .warn { color:var(--warn); } .bad { color:var(--bad); }
  .direction {
    position:absolute; left:50%; bottom:22px; transform:translateX(-50%);
    min-width:150px; max-width:42vw; padding:8px 11px; border:1px solid var(--line);
    border-radius:8px; background:var(--glass); backdrop-filter:blur(10px);
    text-align:center; text-shadow:0 1px 2px #000; font-size:15px;
  }
  .wheel-readout {
    position:absolute; left:13px; bottom:76px; color:var(--muted);
    font-size:12px; text-shadow:0 1px 2px #000;
  }
  .minimap {
    position:absolute; right:12px; top:128px; width:172px; padding:8px;
    border:1px solid var(--line); border-radius:8px; background:var(--glass);
    backdrop-filter:blur(10px); text-shadow:0 1px 2px #000;
  }
  .minimap.ok { border-color:rgba(73,209,125,.55); }
  .minimap.degraded { border-color:rgba(255,201,92,.62); }
  .minimap.missing { border-color:rgba(255,93,93,.5); }
  .minimap-head {
    display:flex; justify-content:space-between; gap:8px; margin-bottom:7px;
    color:var(--muted); font-size:11px;
  }
  .minimap-head span { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .stage-track {
    position:relative; height:44px; border:1px solid rgba(223,235,255,.24);
    border-radius:6px; background:rgba(5,8,12,.72); overflow:hidden;
  }
  .stage-track::before {
    content:""; position:absolute; left:8px; right:8px; top:50%; height:1px;
    background:rgba(223,235,255,.32);
  }
  .stage-track::after {
    content:""; position:absolute; top:6px; bottom:6px; right:8px; width:2px;
    background:rgba(223,235,255,.42);
  }
  .stage-marker {
    position:absolute; top:50%; left:0%; width:13px; height:13px; border-radius:3px 8px 8px 3px;
    background:var(--ok); box-shadow:0 0 12px rgba(73,209,125,.8);
    transform:translate(-50%, -50%); transform-origin:center;
    clip-path:polygon(100% 50%, 0 0, 0 100%);
  }
  .minimap.degraded .stage-marker { background:var(--warn); box-shadow:0 0 12px rgba(255,201,92,.65); }
  .minimap.missing .stage-marker { background:var(--bad); box-shadow:0 0 12px rgba(255,93,93,.55); }
  .minimap-foot {
    display:flex; justify-content:space-between; gap:8px; margin-top:7px;
    color:var(--muted); font-size:11px;
  }
  .minimap-foot span { min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .throttle {
    pointer-events:auto; position:absolute; left:12px; bottom:14px; display:flex; gap:6px;
    padding:6px; border:1px solid var(--line); border-radius:9px;
    background:var(--glass); backdrop-filter:blur(10px);
  }
  .throttle button {
    width:48px; height:36px; border:1px solid rgba(223,235,255,.22);
    border-radius:7px; background:rgba(20,28,38,.72); color:var(--muted);
  }
  .throttle button.active {
    color:#06100a; background:var(--ok); border-color:var(--ok);
  }
  .estop {
    pointer-events:auto; position:absolute; right:14px; bottom:14px; width:84px; height:84px;
    border:0; border-radius:50%; background:var(--bad); color:#fff; font-weight:800;
    font-size:16px; box-shadow:0 7px 28px rgba(255,93,93,.5);
  }
  .modal {
    position:absolute; inset:0; z-index:30; display:grid; place-items:center;
    padding:22px; background:rgba(0,0,0,.22); backdrop-filter:blur(2px);
  }
  .modal.hidden { display:none; }
  .modal-panel {
    width:min(390px, 92vw); border:1px solid var(--line); border-radius:10px;
    background:rgba(8,12,18,.84); backdrop-filter:blur(14px);
    padding:18px; box-shadow:0 18px 60px rgba(0,0,0,.45);
  }
  .modal-panel h1 { margin:0 0 7px; font-size:18px; letter-spacing:0; }
  .modal-panel p { margin:0 0 15px; color:var(--muted); font-size:13px; }
  .modal-status {
    min-height:18px; margin:0 0 12px; color:var(--muted); font-size:12px;
    overflow-wrap:anywhere;
  }
  .modal-status.bad { color:var(--bad); }
  .modal-status.ok { color:var(--ok); }
  .start-button {
    width:100%; height:48px; border:0; border-radius:8px; background:var(--ok);
    color:#041008; font-weight:800;
  }
  .start-button:disabled { opacity:.55; }
  html[data-mode="manual"] .data-panel,
  html[data-mode="manual"] #cameraZone,
  html[data-mode="manual"] .minimap,
  html[data-mode="manual"] .throttle {
    display:none;
  }
  html[data-mode="manual"] .hud { z-index:24; }
  html[data-mode="manual"] .chip-row {
    left:10px; right:10px; top:10px; justify-content:flex-start;
  }
  html[data-mode="manual"] .chip {
    background:rgba(5,8,12,.46);
  }
  html[data-mode="manual"] #driveZone {
    left:18px; bottom:98px; width:184px; height:184px;
    border-color:rgba(89,166,255,.5); background:rgba(5,8,12,.28);
  }
  html[data-mode="manual"] #driveZone::before { inset:25px; }
  html[data-mode="manual"] #driveZone::after {
    content:"drive"; bottom:-28px; font-size:12px; color:var(--txt);
  }
  html[data-mode="manual"] #driveZone .stick-knob {
    width:74px; height:74px;
  }
  html[data-mode="manual"] .wheel-readout {
    left:18px; bottom:302px; padding:7px 9px; border:1px solid var(--line);
    border-radius:8px; background:rgba(5,8,12,.48); backdrop-filter:blur(10px);
    color:var(--txt);
  }
  html[data-mode="manual"] .direction {
    left:10px; right:auto; bottom:auto; top:48px; transform:none;
    min-width:0; max-width:calc(100% - 110px); text-align:left; font-size:12px;
    padding:6px 8px; color:var(--muted);
  }
  html[data-mode="manual"] .estop {
    right:16px; bottom:20px; width:86px; height:86px;
  }
  html[data-mode="manual"] .modal-panel {
    width:min(360px, 90vw); text-align:center;
  }
  html[data-mode="manual"] .modal-panel h1 { font-size:20px; }
  html[data-mode="manual"] .start-button {
    height:62px; font-size:20px;
  }
  @media (max-width:560px) {
    .chip { font-size:11px; min-height:26px; padding:4px 7px; }
    .data-panel { width:min(206px, 62vw); padding:7px 8px; }
    .data-grid { grid-template-columns:31px minmax(0,1fr) 32px minmax(0,1fr); font-size:10px; }
    .direction { max-width:48vw; bottom:20px; font-size:13px; }
    .minimap { top:120px; right:10px; width:148px; }
    .stick-zone { width:126px; height:126px; bottom:108px; }
    #driveZone { left:14px; }
    #cameraZone { right:14px; }
    .stick-knob { width:52px; height:52px; }
    #cameraZone .stick-knob { width:48px; height:48px; }
    .throttle button { width:43px; height:34px; }
    .estop { width:78px; height:78px; }
    html[data-mode="manual"] #driveZone {
      left:16px; bottom:96px; width:174px; height:174px;
    }
    html[data-mode="manual"] #driveZone .stick-knob { width:70px; height:70px; }
    html[data-mode="manual"] .wheel-readout { bottom:292px; }
    html[data-mode="manual"] .estop { width:82px; height:82px; }
  }
  @media (max-width:360px) {
    .chip-row { left:9px; right:9px; gap:7px; }
    .data-panel { width:178px; }
    .data-head { font-size:11px; }
    .data-grid { grid-template-columns:28px minmax(0,1fr) 29px minmax(0,1fr); column-gap:4px; }
    .minimap { width:132px; }
  }
</style>
</head>
<body>
<main id="app">
  <div class="video-fallback" id="videoFallback">camera feed unavailable</div>
  <img class="video off" id="video" alt="" />
  <video class="video local-video off" id="localVideo" muted playsinline autoplay></video>
  <div id="zone">
    <div class="stick-zone" id="driveZone" data-label="drive"><i class="stick-knob"></i></div>
    <div class="stick-zone" id="cameraZone" data-label="camera"><i class="stick-knob"></i></div>
  </div>

  <div class="hud">
    <div class="chip-row">
      <div class="chip conn" id="conn"><i class="dot"></i><span>idle</span></div>
      <div class="data-panel" id="dataPanel">
        <div class="data-head"><span id="robotName">/ courier</span><span id="source">idle</span></div>
        <div class="data-grid">
          <span>bat</span><b id="battery">--</b>
          <span>lag</span><b id="latency">--</b>
          <span>dm</span><b id="deadman">--</b>
          <span>cap</span><b id="cap">--</b>
          <span>slot</span><b id="slotState">--</b>
          <span>time</span><b id="raceTimer">--</b>
          <span>stk</span><b id="stakeState">--</b>
          <span>fee</span><b id="feeState">--</b>
          <span>cam</span><b id="cameraState">--</b>
          <span>c+</span><b id="cameraDetail">--</b>
          <span>lid</span><b id="lidar">--</b>
          <span>yaw</span><b id="yaw">--</b>
          <span>odo</span><b id="odo">--</b>
        </div>
      </div>
    </div>

    <div class="direction" id="direction">Tap start to drive</div>
    <div class="minimap" id="minimap">
      <div class="minimap-head"><span id="stageLabel">stage</span><span id="stageProgress">--</span></div>
      <div class="stage-track"><i class="stage-marker" id="stageMarker"></i></div>
      <div class="minimap-foot"><span id="stageLane">--</span><span id="stageConfidence">--</span></div>
    </div>
    <div class="wheel-readout">L <span id="left">0.00</span> / R <span id="right">0.00</span></div>
    <div class="throttle" id="throttle">
      <button data-speed="low">LOW</button>
      <button data-speed="medium" class="active">MED</button>
      <button data-speed="high">HIGH</button>
    </div>
    <button class="estop" id="estop">STOP</button>
  </div>

  <div class="modal" id="startModal">
    <div class="modal-panel">
      <h1 id="modalTitle">Start Pilot Session</h1>
      <p id="modalCopy">Connect to the Clanker500 camera and unlock controls. Keep the stop button in reach.</p>
      <div class="modal-status" id="modalStatus"></div>
      <button class="start-button" id="startButton" type="button">START</button>
    </div>
  </div>
</main>

<script type="module" src="/pilot-app.bundle.js?v=manual-drive-proof"></script>
</body>
</html>
