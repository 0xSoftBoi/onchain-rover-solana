name: onchain-rover

# Native-Solana-only: the EVM local `chain:` (hardhat/anvil) service has been
# removed. The sidecar talks to a Solana RPC (SOLANA_RPC_URL) — point it at a
# local validator (e.g. http://host.docker.internal:8899) or a cluster RPC.

services:
  sidecar:
    image: node:24-bookworm-slim
    working_dir: /workspace/sidecar
    ports:
      - "${COMPOSE_SIDECAR_PORT:-4021}:4021"
    environment:
      PORT: "4021"
      PUBLIC_SIDECAR_URL: ${COMPOSE_PUBLIC_SIDECAR_URL:-http://127.0.0.1:4021}
      CHAIN_BACKEND: solana
      SOLANA_RPC_URL: ${COMPOSE_SOLANA_RPC_URL:-https://api.devnet.solana.com}
      PUBLIC_SOLANA_RPC_URL: ${COMPOSE_PUBLIC_SOLANA_RPC_URL:-https://api.devnet.solana.com}
      FACILITATOR_SECRET_KEY: ${COMPOSE_FACILITATOR_SECRET_KEY:-}
      SOLANA_DEV_KEYS_DIR: ${COMPOSE_SOLANA_DEV_KEYS_DIR:-/workspace/sidecar/.solana-dev-keys}
      RACE_NETWORK_FEE_USDC: ${COMPOSE_RACE_NETWORK_FEE_USDC:-0.25}
      TREASURY_ADDRESS: ${COMPOSE_TREASURY_ADDRESS:-}
      ALLOW_FREE_PILOT: ${COMPOSE_ALLOW_FREE_PILOT:-0}
      ALLOW_ROUND_PILOT: ${COMPOSE_ALLOW_ROUND_PILOT:-0}
      ALLOW_SHOW_RACE_AUTOSTART: ${COMPOSE_ALLOW_SHOW_RACE_AUTOSTART:-0}
      ALLOW_SHOW_X402_FALLBACK: ${COMPOSE_ALLOW_SHOW_X402_FALLBACK:-0}
      SHOW_FINISH_ODOMETRY_M: ${COMPOSE_SHOW_FINISH_ODOMETRY_M:-}
      ALLOW_LOCAL_DEV_WALLETS: ${COMPOSE_ALLOW_LOCAL_DEV_WALLETS:-0}
      GUARD_URL: ${COMPOSE_GUARD_URL:-http://172.16.2.151:8000}
      COURIER_URL: ${COMPOSE_COURIER_URL:-http://192.168.0.192:8000}
    volumes:
      - .:/workspace
      - sidecar_node_modules:/workspace/sidecar/node_modules
    command: >
      bash -lc '
        set -euo pipefail
        npm ci
        npm run build:pilot
        npm run start
      '
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          node -e "fetch('http://127.0.0.1:4021/chain/health').then((r) => r.json()).then((j) => process.exit(j.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

volumes:
  sidecar_node_modules:
